apiVersion: v1
kind: Pod
metadata:
  name: pod-db
  labels:
    tier: database
spec:
  containers:
    - name: mysql
      image: mysql:8.0
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: "uadb_root_pass"
        - name: MYSQL_DATABASE
          value: "uadb_cloud_db"
        - name: MYSQL_USER
          value: "user_uadb"
        - name: MYSQL_PASSWORD
          value: "votre_password_securise"
      ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: service-db
spec:
  selector:
    tier: database
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
