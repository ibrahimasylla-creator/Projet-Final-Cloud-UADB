apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-firewall
  labels:
    special: firewall-gateway
spec:
  running: true
  template:
    spec:
      domain:
        devices:
          interfaces:
            - name: default
              masquerade: {} # Interface unique autorisée (Accès Internet/Pod Network)
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
      networks:
        - name: default
          pod: {}
      volumes:
        - containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
          name: containerdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: firewall-uadb
              packages:
                - iptables
                - iptables-persistent
              write_files:
                - content: |
                    #!/bin/bash
                    # 1. Activation du routage au niveau du noyau
                    echo 1 > /proc/sys/net/ipv4/ip_forward
                    
                    # 2. Nettoyage des règles existantes
                    iptables -F
                    iptables -t nat -F
                    
                    # 3. Sécurisation : On autorise le trafic établi et le loopback
                    iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
                    iptables -A INPUT -i lo -j ACCEPT
                    
                    # 4. SSH : Autoriser l'administration (Port 22)
                    iptables -A INPUT -p tcp --dport 22 -j ACCEPT

                    # 5. Persistance des règles
                    netfilter-persistent save
                  path: /usr/local/bin/setup-firewall.sh
                  permissions: '0755'
              runcmd:
                - /usr/local/bin/setup-firewall.sh
          name: cloudinitdisk
