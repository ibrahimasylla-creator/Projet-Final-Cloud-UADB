apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-web
  labels:
    app: uadb-web
spec:
  runStrategy: Always
  template:
    spec:
      domain:
        resources: # <--- AJOUTÉ : Règle l'erreur de démarrage
          requests:
            memory: 1Gi
          limits:
            memory: 1Gi
        devices:
          interfaces:
            - name: default
              masquerade: {}
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
      networks:
        - name: default
          pod: {}
      volumes:
        - containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
          name: containerdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              user: ubuntu
              password: 'UadbCloud2024!'
              chpasswd: { expire: False }
              ssh_pwauth: True
              hostname: vm-web-uadb
              runcmd:
                - apt-get update
                - apt-get install -y nodejs npm
                - mkdir -p /home/ubuntu/app
                - cd /home/ubuntu/app
                - npm init -y
                - npm install express mysql2
                - |
                  echo "const express = require('express');
                  const app = express();
                  app.get('/', (req, res) => res.send('<h1>UADB - SERVEUR WEB OK</h1>'));
                  app.listen(3000);" > server.js
                - nohup node server.js > app.log 2>&1 &
          name: cloudinitdisk
